# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # 'main' branch-ga har safar push bo'lganda ishga tushadi
  push:
    branches: ["main"]

  # Actions tabidan qo'lda ishga tushirish imkoniyati
  workflow_dispatch:

# GITHUB_TOKEN ruxsatlarini sozlash
permissions:
  contents: read
  pages: write
  id-token: write

# Bir vaqtning o'zida faqat bitta deploy bo'lishini ta'minlash
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # MUHIM: index.html turgan papkani ko'rsatamiz
          path: './main'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
